spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jan_price_checker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
